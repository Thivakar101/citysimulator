<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My City</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #eaf7ff;
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            display: grid;
            place-items: center;
            color: #213547;
        }

        /* ── Main wrapper ── */
        #ui {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ── 3D canvas fills everything ── */
        #game-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Top bar ── */
        #hud {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #b9e4ff;
            border-radius: 18px;
            padding: 8px 12px;
            box-shadow: 0 8px 20px rgba(61, 128, 169, 0.14);
        }

        .hud-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 18px;
            font-weight: 900;
            color: #213547;
            white-space: nowrap;
        }

        .hud-stat .emoji {
            font-size: 20px;
        }

        .hud-sep {
            width: 1px;
            height: 24px;
            background: #d8eefc;
        }

        /* ── Left store panel ── */
        #store {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.96);
            border: 2px solid #b9e4ff;
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(61, 128, 169, 0.14);
        }

        .store-title {
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            color: #213547;
            margin-bottom: 0;
        }

        .build-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            border: none;
            border-radius: 14px;
            padding: 10px 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            font-size: 13px;
            color: #213547;
            background: #f8fdff;
            border: 2px solid #d4edf9;
            transition: transform 0.12s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            min-width: 86px;
        }

        .build-btn .btn-emoji {
            font-size: 30px;
            line-height: 1;
        }

        .build-btn .btn-label {
            font-size: 14px;
            margin-top: 2px;
        }

        .build-btn .btn-level {
            font-size: 11px;
            background: #d4edf9;
            border-radius: 10px;
            padding: 2px 8px;
            margin-top: 2px;
            color: #213547;
        }

        .build-btn .btn-cost {
            font-size: 11px;
            background: #fff3bf;
            border-radius: 10px;
            padding: 2px 8px;
            margin-top: 2px;
            color: #6b4e00;
            display: none; /* Only used in happiness shop */
        }

        .build-btn:hover {
            transform: translateY(-1px);
            border-color: #81ccec;
            box-shadow: 0 6px 14px rgba(61, 128, 169, 0.16);
        }

        .build-btn:active {
            transform: scale(0.96);
        }

        .build-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(60%);
            position: relative;
            pointer-events: auto;
        }

        .build-btn.locked:hover {
            transform: none;
            border-color: inherit;
            box-shadow: none;
        }

        .lock-overlay {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            background: rgba(0,0,0,0.65);
            color: #fff;
            border-radius: 6px;
            padding: 1px 6px;
            white-space: nowrap;
            pointer-events: none;
        }

        .build-btn.road {
            background: #eef2f7;
            border-color: #cbd5e1;
        }

        .store-road-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        .build-btn.house {
            background: #e7f8ed;
            border-color: #a7e8bd;
        }

        .build-btn.tower {
            background: #e8f1ff;
            border-color: #aecbff;
        }

        .build-btn.factory {
            background: #fff0dc;
            border-color: #ffd19a;
        }

        .build-btn.park {
            background: #edfbdf;
            border-color: #b7e986;
        }

        #cancelPlacement {
            background: #fff1f2;
            border: 2px solid #fecdd3;
            border-radius: 12px;
            color: #9f1239;
            font-family: inherit;
            font-weight: 900;
            font-size: 14px;
            padding: 9px 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: none;
            /* hidden until placement starts */
        }

        #cancelPlacement:hover {
            transform: scale(1.05);
        }

        #cancelPlacement.visible {
            display: block;
        }

        .store-level-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        .store-level-title {
            font-size: 12px;
            font-weight: 900;
            color: #4b6475;
            text-align: center;
            text-transform: uppercase;
        }

        /* ── Right Happiness Shop ── */
        #happinessShop {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.96);
            border: 2px solid #b9e4ff;
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(61, 128, 169, 0.14);
        }

        #happinessShop .btn-cost {
            display: block; /* show happiness cost */
            background: #ffdce3;
            color: #a31236;
        }

        /* ── Status toast ── */
        #status {
            position: absolute;
            bottom: 76px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            padding: 10px 16px;
            border-radius: 14px;
            background: #fff7ed;
            border: 2px solid #fed7aa;
            color: #9a3412;
            font-size: 15px;
            font-weight: 900;
            font-family: inherit;
            display: none;
            white-space: nowrap;
        }

        /* Splash screen removed */

        @media (max-width: 700px) {
            #hud {
                top: 10px;
                padding: 7px 10px;
            }

            .hud-stat {
                font-size: 15px;
            }

            #store, #happinessShop {
                left: 0;
                right: 0;
                top: auto;
                bottom: 82px;
                transform: none;
                flex-direction: row;
                align-items: flex-start;
                max-width: 100vw;
                overflow-x: auto;
                padding: 9px;
            }

            #happinessShop {
                bottom: 10px;
            }

            .store-title {
                display: none;
            }
            
            .store-level-group {
                flex-direction: row;
                margin-bottom: 0;
                align-items: center;
                border-right: 1px solid #ccc;
                padding-right: 8px;
            }

            .store-level-title {
                display: none;
            }

            .build-btn {
                flex: 0 0 58px;
                min-width: 58px;
                padding: 8px 6px;
            }

            .build-btn .btn-emoji {
                font-size: 25px;
            }

            .build-btn .btn-label {
                font-size: 12px;
            }

            .build-btn .btn-level, .build-btn .btn-cost {
                font-size: 11px;
            }

            #status {
                bottom: 160px;
                max-width: calc(100vw - 24px);
                white-space: normal;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- Splash screen removed -->

    <!-- Main game UI -->
    <div id="ui">

        <!-- 3D canvas -->
        <div id="game-container"></div>

        <!-- Top HUD bar -->
        <div id="hud">
            <div class="hud-stat"><span class="emoji">⭐</span> <span id="levelText">Level 1</span></div>
            <div class="hud-sep"></div>
            <div class="hud-stat"><span class="emoji">📈</span> <span id="progressText">0/25</span></div>
            <div class="hud-sep"></div>
            <div class="hud-stat"><span class="emoji">💖</span> <span id="happinessPointsText">0</span></div>
            <div class="hud-sep"></div>
            <div class="hud-stat"><span class="emoji">😊</span> <span id="happyText">100%</span></div>
        </div>

        <!-- Left store -->
        <div id="store">
            <div class="store-title">Build</div>
            
            <button id="cancelPlacement">❌ Stop</button>

            <div class="store-road-group">
                <div class="store-level-title">Roads</div>
                <button class="build-btn road" id="buyRoad">
                    <span class="btn-emoji">🛣️</span>
                    <span class="btn-label">Road</span>
                    <span class="btn-level">All Lvls</span>
                </button>
            </div>
            
            <div class="store-level-group" id="lvl1Group">
                <div class="store-level-title">Level 1</div>
                <button class="build-btn house" id="buyHouse1">
                    <span class="btn-emoji">🏠</span>
                    <span class="btn-label">House 1</span>
                </button>
                <button class="build-btn factory" id="buyFactory">
                    <span class="btn-emoji">🏭</span>
                    <span class="btn-label">Factory</span>
                </button>
                <button class="build-btn tower" id="buyTower">
                    <span class="btn-emoji">🏢</span>
                    <span class="btn-label">Tower</span>
                </button>
                <button class="build-btn park" id="buyShop">
                    <span class="btn-emoji">🏪</span>
                    <span class="btn-label">Shop</span>
                </button>
            </div>

            <div class="store-level-group" id="lvl2Group">
                <div class="store-level-title">Level 2</div>
                <button class="build-btn house" id="buyHouse2">
                    <span class="btn-emoji">🏡</span>
                    <span class="btn-label">House 2</span>
                </button>
                <button class="build-btn tower" id="buyApartment">
                    <span class="btn-emoji">🏘️</span>
                    <span class="btn-label">Apartment</span>
                </button>
                <button class="build-btn tower" id="buyClockTower">
                    <span class="btn-emoji">🕰️</span>
                    <span class="btn-label">Clock Tower</span>
                </button>
            </div>

            <div class="store-level-group" id="lvl3Group">
                <div class="store-level-title">Level 3</div>
                <button class="build-btn tower" id="buySkyscraper">
                    <span class="btn-emoji">🏙️</span>
                    <span class="btn-label">Skyscraper</span>
                </button>
                <button class="build-btn house" id="buyHospital">
                    <span class="btn-emoji">🏥</span>
                    <span class="btn-label">Hospital</span>
                </button>
                <button class="build-btn factory" id="buyFireStation">
                    <span class="btn-emoji">🚒</span>
                    <span class="btn-label">Fire Station</span>
                </button>
            </div>

            <div class="store-level-group" id="lvl4Group" >
                <div class="store-level-title">Level 4</div>
                <button class="build-btn tower" id="buySchool">
                    <span class="btn-emoji">🏫</span>
                    <span class="btn-label">School</span>
                </button>
                <button class="build-btn tower" id="buyLibrary">
                    <span class="btn-emoji">📚</span>
                    <span class="btn-label">Library</span>
                </button>
                <button class="build-btn house" id="buyBakery">
                    <span class="btn-emoji">🥐</span>
                    <span class="btn-label">Bakery</span>
                </button>
            </div>
        </div>

        <!-- Right Happiness Shop -->
        <div id="happinessShop">
            <div class="store-title">Decorate</div>
            <button class="build-btn" id="getHappinessBtn" style="background:#fff3bf; border-color:#f6c453">
                <span class="btn-emoji">💖</span>
                <span class="btn-label">Free Joy</span>
            </button>
            <button class="build-btn park" id="buyTreeA">
                <span class="btn-emoji">🌲</span>
                <span class="btn-label">Tree A</span>
                <span class="btn-cost">💖 10</span>
            </button>
            <button class="build-btn park" id="buyTreeB">
                <span class="btn-emoji">🌴</span>
                <span class="btn-label">Tree B</span>
                <span class="btn-cost">💖 15</span>
            </button>
            <button class="build-btn park" id="buyFlowerGarden">
                <span class="btn-emoji">🌻</span>
                <span class="btn-label">Garden</span>
                <span class="btn-cost">💖 25</span>
            </button>
            <button class="build-btn park" id="buyPark">
                <span class="btn-emoji">🌳</span>
                <span class="btn-label">Park</span>
                <span class="btn-cost">💖 50</span>
            </button>
        </div>

        <!-- Status / error toast -->
        <div id="status"></div>

        <!-- Notification feed (hidden, used by JS) -->
        <div id="feed" style="display:none;"></div>

    </div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
