<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My City</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background: #eaf7ff;
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            display: grid;
            place-items: center;
            color: #213547;
        }

        /* ── Main wrapper ── */
        #ui {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ── 3D canvas fills everything ── */
        #game-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Top bar ── */
        #hud {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #b9e4ff;
            border-radius: 18px;
            padding: 8px 12px;
            box-shadow: 0 8px 20px rgba(61, 128, 169, 0.14);
        }

        .hud-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 18px;
            font-weight: 900;
            color: #213547;
            white-space: nowrap;
        }
        .hud-stat .emoji { font-size: 20px; }
        .hud-sep { width: 1px; height: 24px; background: #d8eefc; }

        /* ── Left store panel ── */
        #store {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
                gap: 8px;
            background: rgba(255, 255, 255, 0.96);
            border: 2px solid #b9e4ff;
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(61, 128, 169, 0.14);
        }

        .store-title {
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            color: #213547;
            margin-bottom: 0;
        }

        .build-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            border: none;
            border-radius: 14px;
            padding: 10px 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            font-size: 13px;
            color: #213547;
            background: #f8fdff;
            border: 2px solid #d4edf9;
            transition: transform 0.12s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            min-width: 86px;
        }
        .build-btn .btn-emoji { font-size: 30px; line-height: 1; }
        .build-btn .btn-label { font-size: 14px; margin-top: 2px; }
        .build-btn .btn-cost {
            font-size: 12px;
            background: #fff3bf;
            border-radius: 10px;
            padding: 2px 8px;
            margin-top: 2px;
            color: #6b4e00;
        }
        .build-btn:hover { transform: translateY(-1px); border-color: #81ccec; box-shadow: 0 6px 14px rgba(61, 128, 169, 0.16); }
        .build-btn:active { transform: scale(0.96); }

        .build-btn.road   { background: #eef2f7; border-color: #cbd5e1; }
        .build-btn.house  { background: #e7f8ed; border-color: #a7e8bd; }
        .build-btn.tower  { background: #e8f1ff; border-color: #aecbff; }
        .build-btn.factory{ background: #fff0dc; border-color: #ffd19a; }
        .build-btn.park   { background: #edfbdf; border-color: #b7e986; }

        #cancelPlacement {
            background: #fff1f2;
            border: 2px solid #fecdd3;
            border-radius: 12px;
            color: #9f1239;
            font-family: inherit;
            font-weight: 900;
            font-size: 14px;
            padding: 9px 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: none; /* hidden until placement starts */
        }
        #cancelPlacement:hover { transform: scale(1.05); }
        #cancelPlacement.visible { display: block; }

        /* ── Bottom action buttons ── */
        #actions {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 12px;
        }

        .action-btn {
            border: none;
            border-radius: 14px;
            padding: 13px 18px;
            font-family: inherit;
            font-weight: 900;
            font-size: 16px;
            color: #213547;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.15s ease, opacity 0.15s ease;
            box-shadow: 0 8px 18px rgba(61, 128, 169, 0.14);
            white-space: nowrap;
        }
        .action-btn:hover { transform: translateY(-1px); filter: brightness(1.03); }
        .action-btn:active { transform: scale(0.97); }
        .action-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        #getCoinsBtn  { background: #ffe082; border: 2px solid #f6c453; }
        #expandCityBtn{ background: #b8f3d4; border: 2px solid #7ddfb0; }

        /* ── Status toast ── */
        #status {
            position: absolute;
            bottom: 76px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            padding: 10px 16px;
            border-radius: 14px;
            background: #fff7ed;
            border: 2px solid #fed7aa;
            color: #9a3412;
            font-size: 15px;
            font-weight: 900;
            font-family: inherit;
            display: none;
            white-space: nowrap;
        }

        /* ── Entry / splash screen ── */
        #entry {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: #eaf7ff;
            z-index: 50;
        }

        .entry-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            text-align: center;
            background: #ffffff;
            border: 2px solid #b9e4ff;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 26px rgba(61, 128, 169, 0.16);
            animation: popIn 360ms ease forwards;
            opacity: 0;
        }
        @keyframes popIn { to { opacity:1; transform: scale(1); } from { opacity:0; transform: scale(0.96); } }

        .entry-emoji { font-size: clamp(60px, 12vw, 100px); margin-bottom: 8px; }

        .entry-title {
            font-size: clamp(34px, 7vw, 60px);
            font-weight: 900;
            color: #213547;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .entry-subtitle {
            font-size: clamp(16px, 2.5vw, 21px);
            color: #4b6475;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .entry-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .entry-btn {
            border: none;
            border-radius: 14px;
            padding: 15px 26px;
            font-family: inherit;
            font-weight: 900;
            font-size: clamp(16px, 2.5vw, 20px);
            color: #213547;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.15s ease;
            box-shadow: 0 8px 18px rgba(61, 128, 169, 0.14);
        }
        .entry-btn:hover { transform: translateY(-1px); filter: brightness(1.03); }
        .entry-btn:active { transform: scale(0.95); }
        #startBtn   { background: #b8f3d4; border: 2px solid #7ddfb0; }
        #sandboxBtn { background: #ffe082; border: 2px solid #f6c453; }

        @media (max-width: 700px) {
            #hud {
                top: 10px;
                padding: 7px 10px;
            }

            .hud-stat { font-size: 15px; }

            #store {
                left: 50%;
                right: auto;
                top: auto;
                bottom: 82px;
                transform: translateX(-50%);
                flex-direction: row;
                align-items: center;
                max-width: calc(100vw - 20px);
                overflow-x: auto;
                padding: 9px;
            }

            .store-title { display: none; }
            .build-btn {
                flex: 0 0 58px;
                min-width: 58px;
                padding: 8px 6px;
            }
            .build-btn .btn-emoji { font-size: 25px; }
            .build-btn .btn-label { font-size: 12px; }
            .build-btn .btn-cost { font-size: 11px; }

            #actions {
                width: calc(100vw - 20px);
                bottom: 10px;
                justify-content: center;
            }

            .action-btn {
                flex: 1;
                max-width: 170px;
                padding: 11px 10px;
                font-size: 14px;
            }

            #status {
                bottom: 148px;
                max-width: calc(100vw - 24px);
                white-space: normal;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Splash screen -->
    <div id="entry">
        <div class="entry-card">
            <div class="entry-emoji">🏙️</div>
            <div class="entry-title">My City!</div>
            <div class="entry-subtitle">Make a small happy town.</div>
            <div class="entry-btns">
                <button class="entry-btn" id="startBtn">▶ Play</button>
                <button class="entry-btn" id="sandboxBtn">✨ Free Play</button>
            </div>
        </div>
    </div>

    <!-- Main game UI -->
    <div id="ui">

        <!-- 3D canvas -->
        <div id="game-container"></div>

        <!-- Top HUD bar -->
        <div id="hud">
            <div class="hud-stat"><span class="emoji">🪙</span> <span id="coinText">0</span></div>
            <div class="hud-sep"></div>
            <div class="hud-stat"><span class="emoji">👥</span> <span id="popText">0</span></div>
            <div class="hud-sep"></div>
            <div class="hud-stat"><span class="emoji">😊</span> <span id="happyText">100%</span></div>
        </div>

        <!-- Left store -->
        <div id="store">
            <div class="store-title">Build</div>
            <button class="build-btn road"    id="buyRoad">
                <span class="btn-emoji">🛣️</span>
                <span class="btn-label">Road</span>
                <span class="btn-cost">🪙 5</span>
            </button>
            <button class="build-btn house"   id="buyHouse">
                <span class="btn-emoji">🏠</span>
                <span class="btn-label">House</span>
                <span class="btn-cost">🪙 50</span>
            </button>
            <button class="build-btn tower"   id="buyTower">
                <span class="btn-emoji">🏢</span>
                <span class="btn-label">Tower</span>
                <span class="btn-cost">🪙 75</span>
            </button>
            <button class="build-btn factory" id="buyFactory">
                <span class="btn-emoji">🏭</span>
                <span class="btn-label">Factory</span>
                <span class="btn-cost">🪙 100</span>
            </button>
            <button class="build-btn park"    id="buyPark">
                <span class="btn-emoji">🌳</span>
                <span class="btn-label">Park</span>
                <span class="btn-cost">🪙 30</span>
            </button>
            <button id="cancelPlacement">❌ Stop</button>
        </div>

        <!-- Bottom action buttons -->
        <div id="actions">
            <button class="action-btn" id="getCoinsBtn">🪙 Get Coins</button>
            <button class="action-btn" id="expandCityBtn">🗺️ More Land</button>
        </div>

        <!-- Status / error toast -->
        <div id="status"></div>

        <!-- Notification feed (hidden, used by JS) -->
        <div id="feed" style="display:none;"></div>

    </div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    <script src="./threecity.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const statusEl = document.getElementById('status');
            const showError = (msg) => { statusEl.textContent = msg; statusEl.style.display = 'block'; };

            try {
                if (!window.THREE) throw new Error('3D engine failed to load. Check your internet.');

                const game = new City3DGame({
                    containerId: 'game-container',
                    gridSize: 5,
                    cellSize: 6,
                    buildingCost: 50,
                    coinIncrement: 50
                });

                // Entry buttons
                const entry = document.getElementById('entry');
                const hideEntry = () => {
                    entry.style.transition = 'opacity 350ms ease';
                    entry.style.opacity = '0';
                    setTimeout(() => entry.style.display = 'none', 370);
                };
                document.getElementById('startBtn').addEventListener('click', () => {
                    game.coins = 200;
                    game._updateUI();
                    hideEntry();
                    game.introCinematic?.();
                });
                document.getElementById('sandboxBtn').addEventListener('click', () => {
                    game.coins = 9999;
                    game._updateUI();
                    hideEntry();
                    game.introCinematic?.();
                });

                // Show/hide cancel button when placement active
                const cancelBtn = document.getElementById('cancelPlacement');
                const origCancelPlacement = game._cancelPlacement.bind(game);
                game._cancelPlacement = () => {
                    origCancelPlacement();
                    cancelBtn.classList.remove('visible');
                };
                const origHookStore = game._hookStore.bind(game);
                // Monkey-patch to show cancel on selection
                ['buyRoad','buyHouse','buyTower','buyFactory','buyPark'].forEach(id => {
                    const btn = document.getElementById(id);
                    if (btn) btn.addEventListener('click', () => cancelBtn.classList.add('visible'));
                });
                cancelBtn.addEventListener('click', () => {
                    game._cancelPlacement();
                    cancelBtn.classList.remove('visible');
                });

            } catch (e) {
                console.error(e);
                showError('Oops! Something went wrong: ' + e.message);
            }
        });
    </script>
</body>
</html>
